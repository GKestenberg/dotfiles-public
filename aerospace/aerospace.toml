config-version = 2

[mode.main.binding]
# Focus windows
ctrl-alt-h = 'focus --boundaries all-monitors-outer-frame left'
ctrl-alt-j = 'focus --boundaries all-monitors-outer-frame down'
ctrl-alt-k = 'focus --boundaries all-monitors-outer-frame up'
ctrl-alt-l = 'focus --boundaries all-monitors-outer-frame right'

# Swap/move windows
ctrl-alt-a = 'move --boundaries all-monitors-outer-frame left'
ctrl-alt-s = 'move --boundaries all-monitors-outer-frame down'
ctrl-alt-w = 'move --boundaries all-monitors-outer-frame up'
ctrl-alt-d = 'move --boundaries all-monitors-outer-frame right'

# Layout
ctrl-alt-enter = 'fullscreen'
ctrl-alt-p = 'layout floating tiling'
ctrl-alt-e = 'balance-sizes'
ctrl-alt-slash = 'layout tiles horizontal vertical accordion'

# Service mode for rearranging windows
ctrl-alt-semicolon = 'mode service'

# Resize
ctrl-alt-9 = 'resize smart -50'
ctrl-alt-0 = 'resize smart +50'

# Reload config
ctrl-alt-r = 'reload-config'

# App launchers
ctrl-alt-t = 'exec-and-forget open -a Ghostty'
ctrl-alt-g = 'exec-and-forget open -a "Google Chrome"'
ctrl-alt-f = 'exec-and-forget $HOME/.config/skhd/scripts/toggle_layout.sh'

[mode.service.binding]
# Exit service mode
esc = 'mode main'
enter = 'mode main'

# Move windows with HJKL
h = 'move left'
j = 'move down'
k = 'move up'
l = 'move right'

# Move windows with arrow keys
left = 'move left'
down = 'move down'
up = 'move up'
right = 'move right'

[[on-window-detected]]
if.app-id="com.mitchellh.ghostty"
run= [
  "layout tiling",
]
